<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>귀화 시험 기출 — 오늘의 20문제</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green:#1a7a55;--green-l:#e6f4ef;--green-m:#2ea878;
    --red:#c0392b;--red-l:#fdf0ee;
    --bg:#f7f6f2;--card:#fff;--text:#1a1a18;--sub:#6b6b65;--border:#e2e0d8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  header{background:var(--green);color:#fff;padding:2.5rem 1.5rem 2rem;text-align:center;position:relative;overflow:hidden}
  header::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06)}
  header::after{content:'';position:absolute;bottom:-40px;left:-40px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.04)}
  .htag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;background:rgba(255,255,255,.18);border-radius:20px;padding:4px 14px;margin-bottom:12px}
  header h1{font-family:'Noto Serif KR',serif;font-size:clamp(22px,5vw,32px);font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
  header p{font-size:13px;opacity:.75;font-weight:300}
  .date-bar{background:#fff;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;padding:10px 1.5rem;font-size:13px;flex-wrap:wrap;gap:6px}
  .date-label{color:var(--sub)}.date-label strong{color:var(--text)}
  .next-refresh{color:var(--green);font-weight:500}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:1.25rem 1.5rem;max-width:700px;margin:0 auto}
  .stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
  .stat-num{font-size:22px;font-weight:700;font-family:'Noto Serif KR',serif}
  .stat-num.c{color:var(--green)}.stat-num.w{color:var(--red)}
  .stat-lbl{font-size:11px;color:var(--sub);margin-top:2px}
  .prog-wrap{padding:0 1.5rem 1rem;max-width:700px;margin:0 auto}
  .prog-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--green-m),var(--green));border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
  .prog-text{font-size:11px;color:var(--sub);margin-top:5px;text-align:right}
  .cat-row{display:flex;gap:6px;flex-wrap:wrap;padding:0 1.5rem 1rem;max-width:700px;margin:0 auto}
  .cat-chip{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif}
  .cat-chip:hover{border-color:var(--green);color:var(--green)}
  .cat-chip.active{background:var(--green);border-color:var(--green);color:#fff}
  main{max-width:700px;margin:0 auto;padding:0 1.5rem 4rem}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.75rem;margin-bottom:1rem;box-shadow:0 2px 16px rgba(0,0,0,.07);transition:box-shadow .2s}
  .q-card:hover{box-shadow:0 4px 24px rgba(0,0,0,.1)}
  .q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
  .q-num{font-size:12px;color:var(--sub)}
  .q-cat{font-size:11px;padding:3px 11px;border-radius:20px;background:var(--green-l);color:var(--green);font-weight:500}
  .q-text{font-size:16px;font-weight:500;line-height:1.65;margin-bottom:1.25rem;font-family:'Noto Serif KR',serif}
  .options{display:flex;flex-direction:column;gap:8px}
  .opt{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;background:var(--bg)}
  .opt:hover:not(.locked){border-color:var(--green);background:var(--green-l)}
  .opt.locked{cursor:default}
  .opt.sel-c{border-color:var(--green);background:var(--green-l)}
  .opt.sel-w{border-color:var(--red);background:var(--red-l)}
  .opt.reveal{border-color:var(--green);background:var(--green-l)}
  .badge{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;color:var(--sub);background:#fff;transition:all .15s}
  .opt.sel-c .badge{background:var(--green);border-color:var(--green);color:#fff}
  .opt.sel-w .badge{background:var(--red);border-color:var(--red);color:#fff}
  .opt.reveal .badge{background:var(--green);border-color:var(--green);color:#fff}
  .opt-text{font-size:14px;line-height:1.5;color:var(--text);padding-top:3px}
  .fb{margin-top:12px;padding:13px 15px;border-radius:10px;font-size:13.5px;line-height:1.65;display:none}
  .fb.show{display:block}
  .fb.c{background:var(--green-l);color:#0d5c3a;border:1px solid #a8dac5}
  .fb.w{background:var(--red-l);color:#8b2020;border:1px solid #f5b8b0}
  .fb-title{font-weight:700;margin-bottom:4px;font-size:13px}
  .next-wrap{margin-top:14px;display:none}
  .next-wrap.show{display:block}
  .btn-next{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .15s}
  .btn-next:hover{background:#145e40}
  .result-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3rem 2rem;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.07)}
  .result-emoji{font-size:48px;margin-bottom:1rem}
  .result-title{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;margin-bottom:8px}
  .result-score{font-size:56px;font-weight:700;color:var(--green);font-family:'Noto Serif KR',serif;line-height:1;margin:1rem 0}
  .result-msg{font-size:14px;color:var(--sub);margin-bottom:1.5rem;line-height:1.6}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
  .result-stat{background:var(--bg);border-radius:10px;padding:12px;font-size:13px}
  .result-stat span{font-size:20px;font-weight:700;display:block;margin-bottom:2px}
  .btn-retry{background:var(--green);color:#fff;border:none;border-radius:10px;padding:14px 40px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .15s}
  .btn-retry:hover{background:#145e40}
  footer{text-align:center;padding:2rem;font-size:12px;color:var(--sub);border-top:1px solid var(--border);background:var(--card)}
  footer strong{color:var(--green)}
  @media(max-width:480px){.stats-row{grid-template-columns:repeat(2,1fr)}header{padding:2rem 1rem 1.5rem}.q-card{padding:1.25rem}.result-score{font-size:44px}}
</style>
</head>
<body>
<header>
  <div class="htag">사회통합프로그램 종합평가 대비</div>
  <h1>🇰🇷 귀화 시험 기출 문제</h1>
  <p>매일 새로운 20문제 · 정답 즉시 확인</p>
</header>
<div class="date-bar">
  <span class="date-label" id="today-label">오늘: <strong>--</strong></span>
  <span class="next-refresh" id="refresh-label">⏰ 다음 갱신까지 --</span>
</div>
<div class="stats-row">
  <div class="stat-box"><div class="stat-num" id="s-total">20</div><div class="stat-lbl">오늘 문제</div></div>
  <div class="stat-box"><div class="stat-num" id="s-done">0</div><div class="stat-lbl">푼 문제</div></div>
  <div class="stat-box"><div class="stat-num c" id="s-correct">0</div><div class="stat-lbl">정답</div></div>
  <div class="stat-box"><div class="stat-num w" id="s-wrong">0</div><div class="stat-lbl">오답</div></div>
</div>
<div class="prog-wrap">
  <div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div class="prog-text" id="prog-text">0 / 20 완료</div>
</div>
<div class="cat-row" id="cat-row"></div>
<main id="quiz-main"></main>
<footer><strong>귀화 시험 기출 문제</strong> · 사회통합프로그램 종합평가 기준<br>매일 자정 문제가 새로 갱신됩니다</footer>

<script>
const DB=[
  // 역사 (20문제)
  {cat:"역사",q:"대한민국의 광복절은 몇 월 며칠인가요?",opts:["7월 17일","8월 15일","3월 1일","10월 3일"],ans:1,exp:"광복절(8월 15일)은 1945년 일본 식민지배로부터 해방된 날을 기념합니다."},
  {cat:"역사",q:"3·1 운동이 일어난 연도는?",opts:["1910년","1919년","1945년","1950년"],ans:1,exp:"1919년 3월 1일 일제 강점기에 독립을 선언한 민족운동입니다."},
  {cat:"역사",q:"한국 전쟁이 시작된 연도는?",opts:["1945년","1948년","1950년","1953년"],ans:2,exp:"한국 전쟁은 1950년 6월 25일에 시작되어 '6·25 전쟁'이라고도 합니다."},
  {cat:"역사",q:"대한민국 정부가 수립된 해는?",opts:["1945년","1948년","1950년","1953년"],ans:1,exp:"1948년 8월 15일 대한민국 정부가 공식 수립되었습니다."},
  {cat:"역사",q:"조선을 건국한 인물은?",opts:["왕건","이성계","세종대왕","광개토대왕"],ans:1,exp:"이성계는 1392년 고려를 멸하고 조선을 건국하였습니다."},
  {cat:"역사",q:"한글을 창제한 왕은?",opts:["태조","태종","세종대왕","성종"],ans:2,exp:"세종대왕은 1443년 훈민정음(한글)을 창제하였습니다."},
  {cat:"역사",q:"임진왜란이 일어난 연도는?",opts:["1392년","1592년","1636년","1876년"],ans:1,exp:"임진왜란은 1592년 일본이 조선을 침략한 전쟁입니다."},
  {cat:"역사",q:"고려를 세운 인물은?",opts:["이성계","왕건","김유신","장보고"],ans:1,exp:"왕건은 918년 고려를 건국하였습니다."},
  {cat:"역사",q:"삼국을 통일한 나라는?",opts:["고구려","백제","신라","가야"],ans:2,exp:"신라는 676년 삼국을 통일하였습니다."},
  {cat:"역사",q:"단군왕검이 세운 나라는?",opts:["고조선","부여","동예","옥저"],ans:0,exp:"고조선은 기원전 2333년 단군왕검이 건국한 우리나라 최초의 국가입니다."},
  {cat:"역사",q:"안중근 의사가 하얼빈에서 처단한 인물은?",opts:["이토 히로부미","메이지 천황","도요토미 히데요시","야마가타 아리토모"],ans:0,exp:"안중근 의사는 1909년 하얼빈에서 이토 히로부미를 사살하였습니다."},
  {cat:"역사",q:"동학 농민 운동이 일어난 연도는?",opts:["1876년","1894년","1905년","1919년"],ans:1,exp:"동학 농민 운동은 1894년 전라도에서 시작된 농민 봉기입니다."},
  {cat:"역사",q:"조선 시대 최고 교육기관은?",opts:["서원","향교","성균관","학당"],ans:2,exp:"성균관은 조선 시대 최고 국립 교육기관으로 현재 성균관대학교의 전신입니다."},
  {cat:"역사",q:"을사늑약이 체결된 연도는?",opts:["1895년","1905년","1910년","1919년"],ans:1,exp:"1905년 일본이 대한제국의 외교권을 빼앗기 위해 강제로 맺은 조약입니다."},
  {cat:"역사",q:"일제 강점기가 시작된 연도는?",opts:["1895년","1905년","1910년","1919년"],ans:2,exp:"1910년 한일 병합 조약으로 대한제국이 일본에 강제 병합되었습니다."},
  {cat:"역사",q:"6월 민주 항쟁이 일어난 연도는?",opts:["1960년","1979년","1980년","1987년"],ans:3,exp:"1987년 6월 민주 항쟁으로 직선제 개헌이 이루어졌습니다."},
  {cat:"역사",q:"4·19 혁명이 일어난 연도는?",opts:["1948년","1960년","1961년","1980년"],ans:1,exp:"1960년 4·19 혁명으로 이승만 정권이 무너졌습니다."},
  {cat:"역사",q:"한국의 최초 금속 활자 발명 시기는?",opts:["고려 시대","조선 초기","조선 중기","일제 강점기"],ans:0,exp:"고려 시대에 세계 최초로 금속 활자가 발명되었습니다(13세기)."},
  {cat:"역사",q:"이순신 장군이 활약한 전쟁은?",opts:["병자호란","정묘호란","임진왜란","한국 전쟁"],ans:2,exp:"이순신 장군은 임진왜란(1592~1598)에서 거북선을 이용해 일본군을 격파했습니다."},
  {cat:"역사",q:"대한민국 최초의 대통령은?",opts:["박정희","윤보선","이승만","김구"],ans:2,exp:"이승만은 1948년 대한민국 초대 대통령에 취임했습니다."},
  // 정치·제도 (15문제)
  {cat:"정치·제도",q:"대한민국의 국회의원 임기는?",opts:["2년","3년","4년","5년"],ans:2,exp:"대한민국 국회의원의 임기는 4년입니다."},
  {cat:"정치·제도",q:"대한민국 대통령의 임기는?",opts:["4년 중임제","5년 단임제","6년 단임제","4년 단임제"],ans:1,exp:"대한민국 대통령은 5년 단임제로, 한 번만 대통령을 할 수 있습니다."},
  {cat:"정치·제도",q:"대한민국 헌법이 처음 제정된 연도는?",opts:["1945년","1948년","1950년","1960년"],ans:1,exp:"대한민국 헌법은 1948년 7월 17일 처음 제정되었으며, 제헌절로 기념됩니다."},
  {cat:"정치·제도",q:"헌법재판소의 주요 역할은?",opts:["법률 제정","행정 집행","헌법 분쟁 심판","외교 담당"],ans:2,exp:"헌법재판소는 법률의 위헌 여부, 탄핵 등 헌법에 관한 분쟁을 심판합니다."},
  {cat:"정치·제도",q:"대한민국 국회는 몇 원제인가요?",opts:["단원제","양원제","삼원제","혼합제"],ans:0,exp:"대한민국 국회는 단원제로 하나의 의원으로 구성됩니다."},
  {cat:"정치·제도",q:"삼권분립에서 사법권을 담당하는 기관은?",opts:["국회","청와대","법원","감사원"],ans:2,exp:"삼권분립에서 입법은 국회, 행정은 정부, 사법은 법원이 담당합니다."},
  {cat:"정치·제도",q:"선거권을 가지는 나이는?",opts:["만 16세","만 18세","만 19세","만 20세"],ans:1,exp:"2020년 공직선거법 개정으로 만 18세 이상이 선거권을 가집니다."},
  {cat:"정치·제도",q:"대한민국 국가 예산을 확정하는 기관은?",opts:["기획재정부","감사원","국회","대법원"],ans:2,exp:"국가 예산은 국회의 심의·확정을 거쳐 집행됩니다."},
  {cat:"정치·제도",q:"대한민국의 국기 이름은?",opts:["무궁화기","태극기","한반도기","애국기"],ans:1,exp:"대한민국의 국기는 태극기입니다."},
  {cat:"정치·제도",q:"대한민국 최고 법원은?",opts:["헌법재판소","대법원","고등법원","지방법원"],ans:1,exp:"대법원은 대한민국 최고 법원으로 최종 판결을 내립니다."},
  {cat:"정치·제도",q:"국무총리를 임명하는 사람은?",opts:["국회의장","대통령","대법원장","헌법재판소장"],ans:1,exp:"국무총리는 국회의 동의를 받아 대통령이 임명합니다."},
  {cat:"정치·제도",q:"지방자치단체장의 임기는?",opts:["3년","4년","5년","6년"],ans:1,exp:"광역·기초자치단체장의 임기는 모두 4년입니다."},
  {cat:"정치·제도",q:"대한민국 경찰의 주요 임무가 아닌 것은?",opts:["범죄 수사","교통 단속","소방 업무","치안 유지"],ans:2,exp:"소방 업무는 소방청 및 소방서의 업무입니다."},

const DAILY=20;
function seededRng(seed){let s=seed;return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff}}
function getTodayQ(){
  const d=new Date(),key=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  const seed=key.split('').reduce((a,c)=>a*31+c.charCodeAt(0),0);
  const rng=seededRng(seed);
  const cats=[...new Set(DB.map(q=>q.cat))];
  let pool=[];
  cats.forEach(cat=>{
    const cq=DB.filter(q=>q.cat===cat).map((q,i)=>({...q,_i:DB.indexOf(q)}));
    pool.push(...cq.sort(()=>rng()-.5).slice(0,4));
  });
  const used=new Set(pool.map(q=>q._i));
  const rest=DB.map((q,i)=>({...q,_i:i})).filter(q=>!used.has(q._i)).sort(()=>rng()-.5);
  while(pool.length<DAILY&&rest.length)pool.push(rest.shift());
  return pool.sort(()=>rng()-.5).slice(0,DAILY);
}

let questions=getTodayQ(),answered=new Array(DAILY).fill(false),results=new Array(DAILY).fill(null),filterCat="전체";
window._ua={};

function updateDateBar(){
  const n=new Date();
  document.getElementById('today-label').innerHTML=`오늘: <strong>${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일</strong>`;
  const t=new Date(n);t.setDate(t.getDate()+1);t.setHours(0,0,0,0);
  const diff=t-n,h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
  document.getElementById('refresh-label').textContent=`⏰ 다음 갱신까지 ${h}시간 ${m}분`;
}
function updateStats(){
  const done=results.filter(r=>r!==null).length,c=results.filter(r=>r===true).length,w=results.filter(r=>r===false).length;
  document.getElementById('s-total').textContent=DAILY;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-correct').textContent=c;
  document.getElementById('s-wrong').textContent=w;
  const pct=Math.round(done/DAILY*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${done} / ${DAILY} 완료`;
}
function renderCats(){
  const cats=["전체",...new Set(questions.map(q=>q.cat))];
  document.getElementById('cat-row').innerHTML=cats.map(c=>`<button class="cat-chip ${c===filterCat?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('');
}
function setFilter(c){filterCat=c;renderCats();renderQuiz()}
function renderCard(q,idx){
  const isAns=answered[idx],sel=window._ua[idx];
  const opts=q.opts.map((o,oi)=>{
    let cls='opt';
    if(isAns){cls+=' locked';if(oi===q.ans)cls+=' reveal';if(sel===oi&&oi!==q.ans)cls+=' sel-w';if(sel===oi&&oi===q.ans)cls+=' sel-c reveal';}
    return`<div class="${cls}" ${isAns?'':` onclick="selectAnswer(${idx},${oi})"`} id="o${idx}-${oi}"><div class="badge">${oi+1}</div><div class="opt-text">${o}</div></div>`;
  }).join('');
  const fbCls=results[idx]===true?'c':'w',fbT=results[idx]===true?'✓ 정답입니다!':'✗ 오답입니다.';
  const nextBtn=isAns?(idx<DAILY-1?`<div class="next-wrap show"><button class="btn-next" onclick="scrollNext(${idx})">다음 문제 →</button></div>`:`<div class="next-wrap show"><button class="btn-next" onclick="showResult()">결과 보기 →</button></div>`):'';
  return`<div class="q-card" id="qc${idx}"><div class="q-header"><span class="q-num">문제 ${idx+1} / ${DAILY}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.q}</div><div class="options">${opts}</div><div class="fb ${isAns?fbCls+' show':''}">${isAns?`<div class="fb-title">${fbT}</div>${q.exp}`:''}</div>${nextBtn}</div>`;
}
function renderQuiz(){
  const main=document.getElementById('quiz-main');
  const filtered=filterCat==="전체"?questions.map((q,i)=>({q,i})):questions.map((q,i)=>({q,i})).filter(({q})=>q.cat===filterCat);
  if(results.every(r=>r!==null)&&filterCat==="전체"){showResult();return}
  main.innerHTML=filtered.map(({q,i})=>renderCard(q,i)).join('');
}
function selectAnswer(idx,oi){
  if(answered[idx])return;
  answered[idx]=true;results[idx]=(oi===questions[idx].ans);window._ua[idx]=oi;
  updateStats();
  const card=document.getElementById(`qc${idx}`);
  if(card)card.outerHTML=renderCard(questions[idx],idx);
  if(results.every(r=>r!==null))setTimeout(()=>{if(!document.getElementById('rc'))document.getElementById('quiz-main').insertAdjacentHTML('beforeend',buildResult())},400);
}
function scrollNext(idx){const el=document.getElementById(`qc${idx+1}`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'})}
function buildResult(){
  const c=results.filter(r=>r===true).length,pct=Math.round(c/DAILY*100);
  const e=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'📚':'💪';
  const msg=pct>=90?'완벽합니다! 귀화 시험 합격이 확실해요.':pct>=70?'훌륭해요! 조금만 더 다듬으면 합격입니다.':pct>=50?'좋은 출발이에요. 꾸준히 복습하면 됩니다.':'포기하지 마세요! 매일 꾸준히 풀면 반드시 합격합니다.';
  return`<div class="result-card" id="rc"><div class="result-emoji">${e}</div><div class="result-title">오늘의 결과</div><div class="result-score">${pct}<span style="font-size:28px">점</span></div><div class="result-grid"><div class="result-stat"><span style="color:var(--green)">${c}</span>정답</div><div class="result-stat"><span style="color:var(--red)">${DAILY-c}</span>오답</div></div><p class="result-msg">${msg}<br><br>내일 새로운 문제 세트가 기다립니다!</p><button class="btn-retry" onclick="retryToday()">오늘 문제 다시 풀기</button></div>`;
}
function showResult(){
  const main=document.getElementById('quiz-main');
  if(!document.getElementById('rc'))main.insertAdjacentHTML('beforeend',buildResult());
  document.getElementById('rc').scrollIntoView({behavior:'smooth',block:'center'});
}
function retryToday(){answered=new Array(DAILY).fill(false);results=new Array(DAILY).fill(null);window._ua={};updateStats();renderQuiz();window.scrollTo({top:0,behavior:'smooth'})}

updateDateBar();setInterval(updateDateBar,30000);
updateStats();renderCats();renderQuiz();
</script>
</body>
</html>
