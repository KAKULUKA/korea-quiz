<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>귀화 시험 기출 문제 — 무한 연습</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--green:#1a7a55;--green-l:#e6f4ef;--green-m:#2ea878;--red:#c0392b;--red-l:#fdf0ee;--bg:#f7f6f2;--card:#fff;--text:#1a1a18;--sub:#6b6b65;--border:#e2e0d8}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  header{background:var(--green);color:#fff;padding:2.5rem 1.5rem 2rem;text-align:center;position:relative;overflow:hidden}
  header::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06)}
  header::after{content:'';position:absolute;bottom:-40px;left:-40px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.04)}
  .htag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;background:rgba(255,255,255,.18);border-radius:20px;padding:4px 14px;margin-bottom:12px}
  header h1{font-family:'Noto Serif KR',serif;font-size:clamp(22px,5vw,32px);font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
  header p{font-size:13px;opacity:.75;font-weight:300}
  .sticky-stats{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:10px 1rem;display:flex;justify-content:center;gap:16px;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .ss-item{display:flex;align-items:center;gap:5px}
  .ss-dot{width:8px;height:8px;border-radius:50%}
  .ss-dot.total{background:var(--sub)}.ss-dot.correct{background:var(--green)}.ss-dot.wrong{background:var(--red)}
  .ss-num{font-weight:700;font-family:'Noto Serif KR',serif}
  .ss-num.c{color:var(--green)}.ss-num.w{color:var(--red)}
  .ss-label{color:var(--sub);font-size:11px}
  .ss-pct{font-weight:700;color:var(--green);font-family:'Noto Serif KR',serif;font-size:15px;margin-left:8px;padding-left:8px;border-left:1px solid var(--border)}
  .cat-row{display:flex;gap:6px;flex-wrap:wrap;padding:12px 1.5rem;max-width:700px;margin:0 auto}
  .cat-chip{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif}
  .cat-chip:hover{border-color:var(--green);color:var(--green)}
  .cat-chip.active{background:var(--green);border-color:var(--green);color:#fff}
  main{max-width:700px;margin:0 auto;padding:0 1.5rem 4rem}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.75rem;margin-bottom:1rem;box-shadow:0 2px 16px rgba(0,0,0,.07);transition:box-shadow .2s;animation:slideUp .35s ease-out}
  .q-card:hover{box-shadow:0 4px 24px rgba(0,0,0,.1)}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
  .q-num{font-size:12px;color:var(--sub)}
  .q-cat{font-size:11px;padding:3px 11px;border-radius:20px;background:var(--green-l);color:var(--green);font-weight:500}
  .q-text{font-size:16px;font-weight:500;line-height:1.65;margin-bottom:1.25rem;font-family:'Noto Serif KR',serif}
  .options{display:flex;flex-direction:column;gap:8px}
  .opt{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;background:var(--bg)}
  .opt:hover:not(.locked){border-color:var(--green);background:var(--green-l)}
  .opt.locked{cursor:default}
  .opt.sel-c{border-color:var(--green);background:var(--green-l)}
  .opt.sel-w{border-color:var(--red);background:var(--red-l)}
  .opt.reveal{border-color:var(--green);background:var(--green-l)}
  .badge{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;color:var(--sub);background:#fff;transition:all .15s}
  .opt.sel-c .badge{background:var(--green);border-color:var(--green);color:#fff}
  .opt.sel-w .badge{background:var(--red);border-color:var(--red);color:#fff}
  .opt.reveal .badge{background:var(--green);border-color:var(--green);color:#fff}
  .opt-text{font-size:14px;line-height:1.5;color:var(--text);padding-top:3px}
  .fb{margin-top:12px;padding:13px 15px;border-radius:10px;font-size:13.5px;line-height:1.65;display:none}
  .fb.show{display:block}
  .fb.c{background:var(--green-l);color:#0d5c3a;border:1px solid #a8dac5}
  .fb.w{background:var(--red-l);color:#8b2020;border:1px solid #f5b8b0}
  .fb-title{font-weight:700;margin-bottom:4px;font-size:13px}
  .loader{text-align:center;padding:2rem;color:var(--sub);font-size:14px}
  .loader .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 10px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .round-banner{background:linear-gradient(135deg,var(--green),var(--green-m));color:white;border-radius:16px;padding:1.25rem;margin-bottom:1rem;text-align:center;font-family:'Noto Serif KR',serif;font-size:15px;animation:slideUp .35s ease-out}
  .round-banner .round-num{font-size:28px;font-weight:700;display:block;margin-bottom:4px}
  footer{text-align:center;padding:2rem;font-size:12px;color:var(--sub);border-top:1px solid var(--border);background:var(--card)}
  footer strong{color:var(--green)}
  .scroll-top{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.2);display:none;align-items:center;justify-content:center;z-index:200;transition:opacity .2s}
  .scroll-top.show{display:flex}
  @media(max-width:480px){header{padding:2rem 1rem 1.5rem}.q-card{padding:1.25rem}.sticky-stats{gap:10px;font-size:12px}}
</style>
</head>
<body>
<header>
  <div class="htag">사회통합프로그램 종합평가 대비</div>
  <h1>🇰🇷 귀화 시험 기출 문제</h1>
  <p>스크롤하면 문제가 계속 나옵니다 · 100문제 무한 연습</p>
</header>
<div class="sticky-stats">
  <div class="ss-item"><div class="ss-dot total"></div><span class="ss-num" id="s-done">0</span><span class="ss-label">풀이</span></div>
  <div class="ss-item"><div class="ss-dot correct"></div><span class="ss-num c" id="s-correct">0</span><span class="ss-label">정답</span></div>
  <div class="ss-item"><div class="ss-dot wrong"></div><span class="ss-num w" id="s-wrong">0</span><span class="ss-label">오답</span></div>
  <span class="ss-pct" id="s-pct">0%</span>
</div>
<div class="cat-row" id="cat-row"></div>
<main id="quiz-main"></main>
<div class="loader" id="loader"><div class="spinner"></div>스크롤하면 새 문제가 나옵니다</div>
<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<footer><strong>귀화 시험 기출 문제</strong> · 사회통합프로그램 종합평가 기준<br>100문제 DB · 무한 반복 연습 모드</footer>
<script>
const DB=[
  {cat:"역사",q:"대한민국의 광복절은 몇 월 며칠인가요?",opts:["7월 17일","8월 15일","3월 1일","10월 3일"],ans:1,exp:"광복절(8월 15일)은 1945년 일본 식민지배로부터 해방된 날을 기념합니다."},
  {cat:"역사",q:"3·1 운동이 일어난 연도는?",opts:["1910년","1919년","1945년","1950년"],ans:1,exp:"1919년 3월 1일 일제 강점기에 독립을 선언한 민족운동입니다."},
  {cat:"역사",q:"한국 전쟁이 시작된 연도는?",opts:["1945년","1948년","1950년","1953년"],ans:2,exp:"한국 전쟁은 1950년 6월 25일에 시작되어 '6·25 전쟁'이라고도 합니다."},
  {cat:"역사",q:"대한민국 정부가 수립된 해는?",opts:["1945년","1948년","1950년","1953년"],ans:1,exp:"1948년 8월 15일 대한민국 정부가 공식 수립되었습니다."},
  {cat:"역사",q:"조선을 건국한 인물은?",opts:["왕건","이성계","세종대왕","광개토대왕"],ans:1,exp:"이성계는 1392년 고려를 멸하고 조선을 건국하였습니다."},
  {cat:"역사",q:"한글을 창제한 왕은?",opts:["태조","태종","세종대왕","성종"],ans:2,exp:"세종대왕은 1443년 훈민정음(한글)을 창제하였습니다."},
  {cat:"역사",q:"임진왜란이 일어난 연도는?",opts:["1392년","1592년","1636년","1876년"],ans:1,exp:"임진왜란은 1592년 일본이 조선을 침략한 전쟁입니다."},
  {cat:"역사",q:"고려를 세운 인물은?",opts:["이성계","왕건","김유신","장보고"],ans:1,exp:"왕건은 918년 고려를 건국하였습니다."},
  {cat:"역사",q:"삼국을 통일한 나라는?",opts:["고구려","백제","신라","가야"],ans:2,exp:"신라는 676년 삼국을 통일하였습니다."},
  {cat:"역사",q:"단군왕검이 세운 나라는?",opts:["고조선","부여","동예","옥저"],ans:0,exp:"고조선은 기원전 2333년 단군왕검이 건국한 우리나라 최초의 국가입니다."},
  {cat:"역사",q:"안중근 의사가 하얼빈에서 처단한 인물은?",opts:["이토 히로부미","메이지 천황","도요토미 히데요시","야마가타 아리토모"],ans:0,exp:"안중근 의사는 1909년 하얼빈에서 이토 히로부미를 사살하였습니다."},
  {cat:"역사",q:"동학 농민 운동이 일어난 연도는?",opts:["1876년","1894년","1905년","1919년"],ans:1,exp:"동학 농민 운동은 1894년 전라도에서 시작된 농민 봉기입니다."},
  {cat:"역사",q:"조선 시대 최고 교육기관은?",opts:["서원","향교","성균관","학당"],ans:2,exp:"성균관은 조선 시대 최고 국립 교육기관으로 현재 성균관대학교의 전신입니다."},
  {cat:"역사",q:"을사늑약이 체결된 연도는?",opts:["1895년","1905년","1910년","1919년"],ans:1,exp:"1905년 일본이 대한제국의 외교권을 빼앗기 위해 강제로 맺은 조약입니다."},
  {cat:"역사",q:"일제 강점기가 시작된 연도는?",opts:["1895년","1905년","1910년","1919년"],ans:2,exp:"1910년 한일 병합 조약으로 대한제국이 일본에 강제 병합되었습니다."},
  {cat:"역사",q:"6월 민주 항쟁이 일어난 연도는?",opts:["1960년","1979년","1980년","1987년"],ans:3,exp:"1987년 6월 민주 항쟁으로 직선제 개헌이 이루어졌습니다."},
  {cat:"역사",q:"4·19 혁명이 일어난 연도는?",opts:["1948년","1960년","1961년","1980년"],ans:1,exp:"1960년 4·19 혁명으로 이승만 정권이 무너졌습니다."},
  {cat:"역사",q:"한국의 최초 금속 활자 발명 시기는?",opts:["고려 시대","조선 초기","조선 중기","일제 강점기"],ans:0,exp:"고려 시대에 세계 최초로 금속 활자가 발명되었습니다(13세기)."},
  {cat:"역사",q:"이순신 장군이 활약한 전쟁은?",opts:["병자호란","정묘호란","임진왜란","한국 전쟁"],ans:2,exp:"이순신 장군은 임진왜란에서 거북선을 이용해 일본군을 격파했습니다."},
  {cat:"역사",q:"대한민국 최초의 대통령은?",opts:["박정희","윤보선","이승만","김구"],ans:2,exp:"이승만은 1948년 대한민국 초대 대통령에 취임했습니다."},
  {cat:"정치·제도",q:"대한민국의 국회의원 임기는?",opts:["2년","3년","4년","5년"],ans:2,exp:"대한민국 국회의원의 임기는 4년입니다."},
  {cat:"정치·제도",q:"대한민국 대통령의 임기는?",opts:["4년 중임제","5년 단임제","6년 단임제","4년 단임제"],ans:1,exp:"대한민국 대통령은 5년 단임제입니다."},
  {cat:"정치·제도",q:"대한민국 헌법이 처음 제정된 연도는?",opts:["1945년","1948년","1950년","1960년"],ans:1,exp:"대한민국 헌법은 1948년 7월 17일 처음 제정되었습니다."},
  {cat:"정치·제도",q:"헌법재판소의 주요 역할은?",opts:["법률 제정","행정 집행","헌법 분쟁 심판","외교 담당"],ans:2,exp:"헌법재판소는 헌법에 관한 분쟁을 심판합니다."},
  {cat:"정치·제도",q:"대한민국 국회는 몇 원제인가요?",opts:["단원제","양원제","삼원제","혼합제"],ans:0,exp:"대한민국 국회는 단원제입니다."},
  {cat:"정치·제도",q:"삼권분립에서 사법권을 담당하는 기관은?",opts:["국회","청와대","법원","감사원"],ans:2,exp:"사법은 법원이 담당합니다."},
  {cat:"정치·제도",q:"선거권을 가지는 나이는?",opts:["만 16세","만 18세","만 19세","만 20세"],ans:1,exp:"만 18세 이상이 선거권을 가집니다."},
  {cat:"정치·제도",q:"대한민국 국가 예산을 확정하는 기관은?",opts:["기획재정부","감사원","국회","대법원"],ans:2,exp:"국가 예산은 국회에서 확정합니다."},
  {cat:"정치·제도",q:"대한민국의 국기 이름은?",opts:["무궁화기","태극기","한반도기","애국기"],ans:1,exp:"대한민국의 국기는 태극기입니다."},
  {cat:"정치·제도",q:"대한민국 최고 법원은?",opts:["헌법재판소","대법원","고등법원","지방법원"],ans:1,exp:"대법원은 최고 법원입니다."},
  {cat:"정치·제도",q:"국무총리를 임명하는 사람은?",opts:["국회의장","대통령","대법원장","헌법재판소장"],ans:1,exp:"국무총리는 대통령이 임명합니다."},
  {cat:"정치·제도",q:"지방자치단체장의 임기는?",opts:["3년","4년","5년","6년"],ans:1,exp:"임기는 4년입니다."},
  {cat:"정치·제도",q:"경찰의 주요 임무가 아닌 것은?",opts:["범죄 수사","교통 단속","소방 업무","치안 유지"],ans:2,exp:"소방은 소방청 업무입니다."},
  {cat:"정치·제도",q:"헌법에서 보장하는 기본권이 아닌 것은?",opts:["평등권","자유권","생존권","납세권"],ans:3,exp:"납세는 의무입니다."},
  {cat:"정치·제도",q:"국가 상징이 아닌 것은?",opts:["태극기","애국가","무궁화","한반도기"],ans:3,exp:"한반도기는 공식 국가 상징이 아닙니다."},
  {cat:"사회·문화",q:"설날에 주로 먹는 음식은?",opts:["송편","떡국","삼계탕","만둣국"],ans:1,exp:"설날에는 떡국을 먹습니다."},
  {cat:"사회·문화",q:"추석에 주로 먹는 음식은?",opts:["떡국","삼계탕","송편","비빔밥"],ans:2,exp:"추석에는 송편을 먹습니다."},
  {cat:"사회·문화",q:"국경일이 아닌 것은?",opts:["삼일절","광복절","한글날","추석"],ans:3,exp:"추석은 민속 명절입니다."},
  {cat:"사회·문화",q:"개천절은 몇 월 며칠인가요?",opts:["9월 9일","10월 3일","10월 9일","11월 3일"],ans:1,exp:"개천절은 10월 3일입니다."},
  {cat:"사회·문화",q:"한글날은 몇 월 며칠인가요?",opts:["10월 3일","10월 9일","11월 3일","9월 9일"],ans:1,exp:"한글날은 10월 9일입니다."},

  {cat:"사회·문화",q:"한국의 국화(나라꽃)는?",opts:["장미","벚꽃","무궁화","진달래"],ans:2,exp:"무궁화는 대한민국의 국화입니다."},

  {cat:"생활·법률",q:"일반귀화 최소 거주 기간은?",opts:["3년","5년","7년","10년"],ans:1,exp:"5년 이상 거주해야 합니다."},
  {cat:"생활·법률",q:"민법상 성인 나이는?",opts:["만 18세","만 19세","만 20세","만 21세"],ans:1,exp:"만 19세입니다."},
  {cat:"생활·법률",q:"건강보험 가입자 구분은?",opts:["소득별","직장·지역 가입자","성별","연령별"],ans:1,exp:"직장가입자와 지역가입자입니다."},

  {cat:"생활·법률",q:"주 법정 근로 시간은?",opts:["35시간","40시간","44시간","52시간"],ans:1,exp:"40시간입니다."},
  {cat:"생활·법률",q:"국민연금 수령 시작 나이는?",opts:["55세","60세","65세","70세"],ans:2,exp:"만 65세부터입니다."},
  {cat:"생활·법률",q:"음주 운전 기준은?",opts:["0.03%","0.05%","0.08%","0.10%"],ans:0,exp:"0.03% 이상이면 처벌됩니다."},
  {cat:"생활·법률",q:"쓰레기 배출 시 사용해야 하는 것은?",opts:["일반 봉투","종량제 봉투","비닐봉지","상자"],ans:1,exp:"종량제 봉투를 사용합니다."},
  {cat:"생활·법률",q:"의무 교육 기간은?",opts:["초등 6년","초·중 9년","초·중·고 12년","13년"],ans:1,exp:"총 9년입니다."},
  {cat:"생활·법률",q:"90일 초과 체류 외국인이 소지해야 할 것은?",opts:["주민등록증","외국인등록증","운전면허증","여권"],ans:1,exp:"외국인등록증입니다."},
  {cat:"생활·법률",q:"기초생활수급자 지원이 아닌 것은?",opts:["생계급여","의료급여","교육급여","사치품 구매비"],ans:3,exp:"사치품 구매비는 해당 없습니다."},
  {cat:"생활·법률",q:"고용보험의 주요 역할은?",opts:["의료비 지원","실업급여 지급","노후 연금","산업재해 보상"],ans:1,exp:"실업급여 지급입니다."},
  {cat:"생활·법률",q:"산재 보상을 담당하는 보험은?",opts:["건강보험","국민연금","고용보험","산재보험"],ans:3,exp:"산재보험입니다."},
  {cat:"생활·법률",q:"주민등록증 발급 나이는?",opts:["만 16세","만 17세","만 18세","만 19세"],ans:1,exp:"만 17세 이상입니다."},
  {cat:"역사",q:"고구려를 건국한 인물은?",opts:["박혁거세","온조","주몽","단군왕검"],ans:2,exp:"주몽(동명성왕)이 건국했습니다."},
  {cat:"역사",q:"신라를 건국한 인물은?",opts:["박혁거세","온조","주몽","단군왕검"],ans:0,exp:"박혁거세가 건국했습니다."},
  {cat:"역사",q:"백제를 건국한 인물은?",opts:["박혁거세","온조","주몽","단군왕검"],ans:1,exp:"온조가 건국했습니다."},
  {cat:"역사",q:"조선의 마지막 왕은?",opts:["고종","순종","철종","흥선대원군"],ans:1,exp:"순종(27대)입니다."},
  {cat:"역사",q:"광개토대왕은 어느 나라 왕?",opts:["신라","백제","고구려","고려"],ans:2,exp:"고구려 제19대 왕입니다."},
  {cat:"정치·제도",q:"대통령 탄핵 소추 기관은?",opts:["대법원","국회","헌법재판소","감사원"],ans:1,exp:"국회가 소추합니다."},
  {cat:"정치·제도",q:"행정부 최고 수반은?",opts:["국무총리","대통령","국회의장","대법원장"],ans:1,exp:"대통령입니다."},
  {cat:"정치·제도",q:"감사원의 주요 역할은?",opts:["법률 제정","세입·세출 검사","외교","국방"],ans:1,exp:"세입·세출 검사입니다."},
  {cat:"정치·제도",q:"국민투표로 확정하는 것은?",opts:["일반 법률","헌법 개정안","예산","대법관 임명"],ans:1,exp:"헌법 개정안입니다."},
  {cat:"정치·제도",q:"대한민국 수도는?",opts:["부산","인천","서울","수원"],ans:2,exp:"서울특별시입니다."},
  {cat:"사회·문화",q:"국가(國歌) 이름은?",opts:["아리랑","애국가","군가","한강"],ans:1,exp:"애국가입니다."},
  {cat:"사회·문화",q:"추석은 음력 몇 월 며칠?",opts:["7월 15일","8월 15일","9월 9일","10월 3일"],ans:1,exp:"음력 8월 15일입니다."},
  {cat:"사회·문화",q:"설날 어른께 드리는 절은?",opts:["배례","세배","큰절","반절"],ans:1,exp:"세배입니다."},
  {cat:"지리·경제",q:"두 번째로 긴 강은?",opts:["낙동강","한강","금강","섬진강"],ans:1,exp:"한강(약 514km)입니다."},
  {cat:"생활·법률",q:"형사 미성년자 나이는?",opts:["만 10세 미만","만 14세 미만","만 18세 미만","만 19세 미만"],ans:1,exp:"만 14세 미만입니다."},
  {cat:"생활·법률",q:"운전 시 반드시 소지해야 할 것은?",opts:["주민등록증","운전면허증","여권","외국인등록증"],ans:1,exp:"운전면허증입니다."},
  {cat:"생활·법률",q:"노인 복지 혜택 시작 나이는?",opts:["만 60세","만 65세","만 70세","만 75세"],ans:1,exp:"만 65세 이상입니다."},
  {cat:"생활·법률",q:"혼인 신고는 어디에?",opts:["법원","경찰서","주민센터","출입국청"],ans:2,exp:"주민센터(시·군·구청)입니다."},
  {cat:"생활·법률",q:"분리수거 이유로 가장 적합한 것은?",opts:["자원 절약·환경 보호","봉투 절약","관계 개선","처벌 때문"],ans:0,exp:"자원 절약과 환경 보호입니다."},
  {cat:"생활·법률",q:"건강보험료를 안 내도 되는 대상은?",opts:["직장가입자","피부양자","지역가입자","외국인 근로자"],ans:1,exp:"피부양자입니다."}
];

let globalIdx=0,correct=0,wrong=0,filterCat="전체",shuffled=[],roundNum=1,loading=false;
const BATCH=5,answeredMap={},questionStore={};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function getFilteredDB(){return filterCat==="전체"?[...DB]:DB.filter(q=>q.cat===filterCat)}
function refillPool(){shuffled=shuffle(getFilteredDB())}
function getNextQuestions(n){
  const r=[];
  for(let i=0;i<n;i++){
    if(!shuffled.length){roundNum++;refillPool()}
    r.push(shuffled.shift());
  }
  return r;
}
function updateStats(){
  const done=correct+wrong;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-correct').textContent=correct;
  document.getElementById('s-wrong').textContent=wrong;
  document.getElementById('s-pct').textContent=(done>0?Math.round(correct/done*100):0)+'%';
}
function renderCats(){
  const cats=["전체",...new Set(DB.map(q=>q.cat))];
  document.getElementById('cat-row').innerHTML=cats.map(c=>`<button class="cat-chip ${c===filterCat?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('');
}
function setFilter(c){
  filterCat=c;globalIdx=0;correct=0;wrong=0;roundNum=1;
  Object.keys(answeredMap).forEach(k=>delete answeredMap[k]);
  Object.keys(questionStore).forEach(k=>delete questionStore[k]);
  refillPool();
  document.getElementById('quiz-main').innerHTML='';
  updateStats();renderCats();loadMore();
}
function renderCard(q,idx){
  const info=answeredMap[idx],isAns=!!info,sel=info?.sel;
  const opts=q.opts.map((o,oi)=>{
    let cls='opt';
    if(isAns){cls+=' locked';if(oi===q.ans)cls+=' reveal';if(sel===oi&&oi!==q.ans)cls+=' sel-w';if(sel===oi&&oi===q.ans)cls+=' sel-c reveal'}
    return`<div class="${cls}"${isAns?'':` onclick="selectAnswer(${idx},${oi})"`}><div class="badge">${oi+1}</div><div class="opt-text">${o}</div></div>`;
  }).join('');
  const fbCls=info?.isCorrect?'c':'w',fbT=info?.isCorrect?'✓ 정답입니다!':'✗ 오답입니다.';
  const fb=isAns?`<div class="fb ${fbCls} show"><div class="fb-title">${fbT}</div>${q.exp}</div>`:'<div class="fb"></div>';
  return`<div class="q-card" id="qc${idx}"><div class="q-header"><span class="q-num">문제 ${idx+1}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.q}</div><div class="options">${opts}</div>${fb}</div>`;
}
function loadMore(){
  if(loading)return;loading=true;
  const main=document.getElementById('quiz-main');
  const qs=getNextQuestions(BATCH);
  qs.forEach(q=>{questionStore[globalIdx]=q;main.insertAdjacentHTML('beforeend',renderCard(q,globalIdx));globalIdx++});
  loading=false;
}
function selectAnswer(idx,oi){
  if(answeredMap[idx])return;
  const q=questionStore[idx],isCorrect=oi===q.ans;
  answeredMap[idx]={sel:oi,isCorrect};
  if(isCorrect)correct++;else wrong++;
  updateStats();
  const card=document.getElementById(`qc${idx}`);
  if(card)card.outerHTML=renderCard(q,idx);
}
window.addEventListener('scroll',()=>{
  const scrollY=window.scrollY+window.innerHeight,docH=document.documentElement.scrollHeight;
  if(scrollY>docH-600)loadMore();
  document.getElementById('scrollTopBtn').classList.toggle('show',window.scrollY>400);
},{passive:true});

refillPool();renderCats();updateStats();loadMore();
</script>
